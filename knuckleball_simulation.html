<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knuckleball Simulation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js" defer></script>
<link rel="stylesheet" href="style.css">

</head>
<body>

<h1>⚾ Knuckleball Pitch Simulation</h1>

<div id="wrap">
  <canvas id="cvs"></canvas>
  <div id="panel">
    <div class="panel-title">Pitch Parameters</div>
    <div class="divider"></div>

    <div class="slider-row">
      <label>Speed v₀ (mph)</label>
      <div class="row2">
        <input type="range" id="s_v0" min="55" max="75" value="65" step="1">
        <span class="val" id="d_v0">65</span>
      </div>
    </div>

    <div class="slider-row">
      <label>Elevation θ (deg)</label>
      <div class="row2">
        <input type="range" id="s_theta" min="1" max="8" value="3" step="0.5">
        <span class="val" id="d_theta">3.0°</span>
      </div>
    </div>

    <div class="slider-row">
      <label>Spin rate ω (rpm)</label>
      <div class="row2">
        <input type="range" id="s_omega" min="5" max="60" value="20" step="1">
        <span class="val" id="d_omega">20</span>
      </div>
    </div>

    <div class="slider-row">
      <label>Init angle φ₀ (deg)</label>
      <div class="row2">
        <input type="range" id="s_phi0" min="0" max="67.5" value="0" step="22.5">
        <span class="val" id="d_phi0">0°</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="stat-grid">
      <div class="stat"><div class="slab">x-break</div><div class="sval" id="st_x">—</div></div>
      <div class="stat"><div class="slab">z-drop</div><div class="sval" id="st_z">—</div></div>
      <div class="stat"><div class="slab">flight</div><div class="sval" id="st_t">—</div></div>
      <div class="stat"><div class="slab">plate spd</div><div class="sval" id="st_v">—</div></div>
    </div>

    <div id="status">Adjust sliders and throw</div>
    <button id="throwBtn">▶ Throw pitch</button>
  </div>
</div>

<footer>Physics: Giordano / Watts &amp; Sawyer lateral force model — RK4 integration — h = 1×10⁻⁴</footer>

</body>
</html>
